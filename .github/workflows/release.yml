name: Release – Deploy to Minikube

on:
  workflow_run:
    workflows:
      - 'CI – Continuous Integration'
    types:
      - completed

permissions:
  actions: read
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devsu-demo-nodejs

jobs:
  deploy:
    name: Deploy to Kubernetes (local Minikube)
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' }}
    runs-on: [self-hosted, minikube]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download image tag from CI
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          run-id: ${{ github.event.workflow_run.id }}
          path: ./ci-artifacts

      - name: Export image tag
        run: |
          IMAGE_TAG=$(cat ./ci-artifacts/image_tag.txt)
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "TF_VAR_image_tag=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_image_name: ${{ env.IMAGE_NAME }}
          TF_VAR_database_user: ${{ secrets.DB_USER }}
          TF_VAR_database_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_kubeconfig_context: "minikube"
        run: terraform apply -auto-approve

      - name: Verify rollout
        run: |
          minikube kubectl -- rollout status deployment/devsu-demo-deployment \
            -n devsu-demo --timeout=120s

      - name: Show pods
        run: minikube kubectl -- get pods -n devsu-demo -o wide
