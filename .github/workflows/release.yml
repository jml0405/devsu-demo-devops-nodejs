name: Release – Deploy to Minikube

on:
  workflow_run:
    workflows:
      - 'CI – Continuous Integration'
    types:
      - completed

permissions:
  actions: read
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devsu-demo-nodejs

jobs:
  deploy:
    name: Deploy to Kubernetes (local Minikube)
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute image tag from CI metadata
        run: |
          VERSION=$(awk -F'"' '/"version"/ {print $4; exit}' package.json)
          CI_RUN_NUMBER="${{ github.event.workflow_run.run_number }}"
          CI_SHA="${{ github.event.workflow_run.head_sha }}"
          CI_SHORT_SHA="${CI_SHA:0:7}"
          IMAGE_TAG="v${VERSION}-${CI_RUN_NUMBER}-${CI_SHORT_SHA}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "TF_VAR_image_tag=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Import existing resources (idempotent)
        working-directory: terraform
        run: |
          import_resource() {
            terraform import -input=false "$1" "$2" || true
          }

          import_resource kubernetes_namespace.devsu_demo devsu-demo
          import_resource kubernetes_config_map.devsu_demo devsu-demo/devsu-demo-config
          import_resource kubernetes_secret.devsu_demo devsu-demo/devsu-demo-secret
          import_resource kubernetes_deployment.devsu_demo devsu-demo/devsu-demo-deployment
          import_resource kubernetes_service.devsu_demo devsu-demo/devsu-demo-svc
          import_resource kubernetes_horizontal_pod_autoscaler_v2.devsu_demo devsu-demo/devsu-demo-hpa
          import_resource kubernetes_ingress_v1.devsu_demo devsu-demo/devsu-demo-ingress

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_image_name: ${{ env.IMAGE_NAME }}
          TF_VAR_database_user: ${{ secrets.DB_USER }}
          TF_VAR_database_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_kubeconfig_context: "minikube"
        run: terraform apply -auto-approve

      - name: Verify rollout
        run: |
          minikube kubectl -- rollout status deployment/devsu-demo-deployment \
            -n devsu-demo --timeout=120s

      - name: Show pods
        run: minikube kubectl -- get pods -n devsu-demo -o wide
