name: Release – Docker Build & Push

# Triggers on semantic version tags: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  # Allow manual dispatch from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to push (defaults to latest)'
        required: false
        default: 'latest'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devsu-demo-nodejs
  IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.image_tag }}

jobs:
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to Kubernetes via Terraform (self-hosted runner) ─────────────
  deploy:
    name: Deploy to Kubernetes (local Minikube)
    runs-on: [self-hosted, minikube]
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Build image inside Minikube Docker daemon
        run: |
          eval $(minikube docker-env)
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
                     ${{ env.IMAGE_NAME }}:latest

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_image_name: ${{ env.IMAGE_NAME }}
          TF_VAR_image_tag: ${{ env.IMAGE_TAG }}
          TF_VAR_database_user: ${{ secrets.DB_USER }}
          TF_VAR_database_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_kubeconfig_context: "minikube"
        run: terraform apply -auto-approve

      - name: Verify rollout
        run: |
          minikube kubectl -- rollout status deployment/devsu-demo-deployment \
            -n devsu-demo --timeout=120s

      - name: Show pods
        run: minikube kubectl -- get pods -n devsu-demo -o wide


