name: Release – Deploy to AWS EC2
run-name: AWS ${{ inputs.action }} · ${{ inputs.image_tag }} · ${{ inputs.aws_region }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Operation to execute"
        type: choice
        required: true
        default: deploy
        options:
          - deploy
          - destroy
      image_tag:
        description: "Docker image tag to deploy (from CI)"
        required: false
        default: latest
      aws_region:
        description: "AWS region"
        required: true
        default: us-east-2
      instance_type:
        description: "EC2 instance type"
        required: true
        default: t3.micro
      allowed_cidr:
        description: "CIDR allowed to access the app"
        required: true
        default: 0.0.0.0/0

permissions:
  contents: read

concurrency:
  group: aws-release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devsu-demo-nodejs

jobs:
  deploy:
    name: Deploy to AWS EC2
    if: ${{ inputs.action == 'deploy' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (S3 backend)
        run: |
          terraform -chdir=terraform-aws init \
            -backend-config="bucket=${{ secrets.AWS_TF_STATE_BUCKET }}" \
            -backend-config="key=devsu-demo-nodejs/aws/terraform.tfstate" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Apply
        run: |
          terraform -chdir=terraform-aws apply -auto-approve \
            -var="aws_region=${{ inputs.aws_region }}" \
            -var="instance_type=${{ inputs.instance_type }}" \
            -var="image_name=${{ env.IMAGE_NAME }}" \
            -var="image_tag=${{ inputs.image_tag }}" \
            -var='allowed_cidrs=["${{ inputs.allowed_cidr }}"]'

      - name: Capture outputs
        id: tf_output
        run: |
          ENDPOINT=$(terraform -chdir=terraform-aws output -raw public_endpoint)
          PUBLIC_IP=$(terraform -chdir=terraform-aws output -raw public_ip)
          IMAGE_REF=$(terraform -chdir=terraform-aws output -raw image_deployed)
          terraform -chdir=terraform-aws output -json > terraform-aws-output.json

          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "image_ref=$IMAGE_REF" >> $GITHUB_OUTPUT
          echo "::notice title=AWS endpoint::$ENDPOINT"
          echo "::notice title=AWS image::$IMAGE_REF"

      - name: Upload AWS outputs
        uses: actions/upload-artifact@v4
        with:
          name: aws-terraform-output-${{ inputs.image_tag }}
          path: terraform-aws-output.json
          retention-days: 14

      - name: Release summary
        run: |
          {
            echo "## AWS Release"
            echo ""
            echo "- Action: \`${{ inputs.action }}\`"
            echo "- Region: \`${{ inputs.aws_region }}\`"
            echo "- Instance type: \`${{ inputs.instance_type }}\`"
            echo "- Image: \`${{ steps.tf_output.outputs.image_ref }}\`"
            echo "- Public IP: \`${{ steps.tf_output.outputs.public_ip }}\`"
            echo "- Endpoint: ${{ steps.tf_output.outputs.endpoint }}"
          } >> "$GITHUB_STEP_SUMMARY"

  destroy:
    name: Destroy AWS EC2 deployment
    if: ${{ inputs.action == 'destroy' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (S3 backend)
        run: |
          terraform -chdir=terraform-aws init \
            -backend-config="bucket=${{ secrets.AWS_TF_STATE_BUCKET }}" \
            -backend-config="key=devsu-demo-nodejs/aws/terraform.tfstate" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Destroy
        run: |
          terraform -chdir=terraform-aws destroy -auto-approve \
            -var="aws_region=${{ inputs.aws_region }}" \
            -var="instance_type=${{ inputs.instance_type }}" \
            -var="image_name=${{ env.IMAGE_NAME }}" \
            -var="image_tag=${{ inputs.image_tag }}" \
            -var='allowed_cidrs=["${{ inputs.allowed_cidr }}"]'

      - name: Destroy summary
        run: |
          {
            echo "## AWS Destroy"
            echo ""
            echo "- Action: \`${{ inputs.action }}\`"
            echo "- Region: \`${{ inputs.aws_region }}\`"
            echo "- Resources: \`destroyed\`"
          } >> "$GITHUB_STEP_SUMMARY"
