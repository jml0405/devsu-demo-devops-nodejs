apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devsu-demo-ingress
  namespace: devsu-demo
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: devsu-demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devsu-demo-svc
                port:
                  number: 8000
  # TLS (uncomment and add your TLS secret for production)
  # tls:
  #   - hosts:
  #       - devsu-demo.local
  #     secretName: devsu-demo-tls
